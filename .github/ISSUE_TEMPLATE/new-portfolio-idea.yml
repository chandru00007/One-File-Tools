name: New Portfolio Theme Idea
description: Propose a new portfolio theme.
title: "Idea: "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new portfolio theme! Please fill in the details below.
        Portfolio themes are Handlebars templates generated from data/profile.json. Make sure your idea isn't already an existing theme.

  - type: input
    id: theme-name
    attributes:
      label: Theme Name
      description: A short, descriptive name for the theme.
      placeholder: e.g. Developer, Retro, Fable
    validations:
      required: true

  - type: input
    id: filename
    attributes:
      label: Proposed Filename
      description: Kebab-case .hbs filename.
      placeholder: e.g. retro.hbs
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's the visual style and target audience for this theme?
      placeholder: Describe the design direction — e.g. dark developer-focused, colorful and playful, minimal grid layout.
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: Key Features
      description: List the main features (use bullet points).
      placeholder: |
        - Feature 1
        - Feature 2
        - Feature 3
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Suggested Difficulty
      description: How complex do you think this theme is? (Final label assigned by maintainer, slightly negotiable.)
      options:
        - Easy
        - Medium
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References / Inspiration
      description: Any existing portfolio sites or links for reference? (optional)
      placeholder: Links to similar portfolio designs or screenshots for inspiration.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked existing portfolio themes and open issues for duplicates.
          required: true
        - label: This theme can be built as a single self-contained .hbs file.
          required: true
        - label: This theme does not require a backend server to function.
          required: true