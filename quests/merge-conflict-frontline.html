<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge Conflict: Frontline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0a0d08; --panel:#12160f; --panel2:#1a2015; --line:#333f27;
  --olive:#4c5a34; --olive-dim:#2c3620;
  --ink:#dcd6c2; --ink-dim:#8d8873;
  --amber:#e8a33d; --amber-bright:#ffc266;
  --alpha:#4fb3d9; --alpha-glow:rgba(79,179,217,.14); --alpha-line:rgba(79,179,217,.5);
  --bravo:#e8543d; --bravo-glow:rgba(232,84,61,.14); --bravo-line:rgba(232,84,61,.5);
  --good:#7ed957; --danger:#ff3b3b;
  --font-title:'Black Ops One',sans-serif;
  --font-ui:'Oswald',sans-serif;
  --font-code:'Share Tech Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--void)}
body{
  background:
    radial-gradient(ellipse at 50% -10%, #1c2312 0%, transparent 60%),
    var(--void);
  color:var(--ink); font-family:var(--font-ui); min-height:100vh;
  overflow-x:hidden; position:relative;
}
.grid-overlay{
  position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.35;
  background-image:
    linear-gradient(rgba(76,90,52,.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(76,90,52,.18) 1px, transparent 1px);
  background-size:34px 34px;
}
.radar{
  position:fixed; top:-30vw; right:-30vw; width:70vw; height:70vw; z-index:0;
  border-radius:50%; pointer-events:none; opacity:.16;
  background:conic-gradient(from 0deg, var(--amber) 0deg, transparent 40deg, transparent 360deg);
  animation:sweep 6s linear infinite;
}
.radar::before,.radar::after{
  content:""; position:absolute; border:1px solid var(--olive); border-radius:50%;
}
.radar::before{ inset:12%; }
.radar::after{ inset:32%; }
@keyframes sweep{ to{ transform:rotate(360deg); } }
body.alert::after{
  content:""; position:fixed; inset:0; z-index:40; pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(255,59,59,.28) 100%);
  animation:alertfade 1s ease-out forwards;
}
@keyframes alertfade{ from{opacity:1} to{opacity:0} }
body.hb-1 .clock{ animation:heartbeat 1.8s ease-in-out infinite; }
body.hb-2 .clock{ animation:heartbeat 1.1s ease-in-out infinite; }
body.hb-3 .clock{ animation:heartbeat .7s ease-in-out infinite; color:var(--danger); }
@keyframes heartbeat{ 0%,100%{transform:scale(1)} 30%{transform:scale(1.12)} 50%{transform:scale(1)} }

button{ font-family:inherit; cursor:pointer; color:inherit; background:none; border:none; }
button:focus-visible,a:focus-visible{ outline:2px solid var(--amber-bright); outline-offset:2px; }
.wrap{ max-width:820px; margin:0 auto; padding:28px 20px 60px; position:relative; z-index:1; }
.screen{ animation:screenIn .4s ease both; }
@keyframes screenIn{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }

/* ---- topbar ---- */
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  flex-wrap:wrap; margin-bottom:10px; padding-bottom:14px; border-bottom:1px solid var(--line);
}
.brand{ font-family:var(--font-title); font-size:15px; color:var(--amber); letter-spacing:.06em; }
.brand span{ color:var(--ink-dim); font-family:var(--font-ui); font-size:11px; display:block; letter-spacing:.2em; margin-top:2px; }
.hud-right{ display:flex; align-items:center; gap:22px; flex-wrap:wrap; }
.morale-wrap{ display:flex; align-items:center; gap:8px; }
.morale-label{ font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-dim); }
.morale-gauge{ width:120px; height:10px; background:var(--panel); border:1px solid var(--line); position:relative; }
.morale-gauge::before{
  content:""; position:absolute; inset:0;
  background-image:repeating-linear-gradient(90deg, transparent 0 9px, var(--line) 9px 10px);
}
.morale-fill{ display:block; height:100%; background:linear-gradient(90deg,var(--danger),var(--amber),var(--good)); transition:width .5s ease; }
.clock{ font-family:var(--font-code); font-size:20px; color:var(--amber-bright); letter-spacing:.05em; }
.clock::before{ content:"OP CLOCK "; font-family:var(--font-ui); font-size:10px; color:var(--ink-dim); letter-spacing:.15em; }

/* ---- dossier / mission chips ---- */
.chips{ display:flex; gap:8px; margin:16px 0 22px; flex-wrap:wrap; }
.chip{
  width:30px; height:22px; border:1px solid var(--line); background:var(--panel);
  clip-path:polygon(10% 0,100% 0,100% 100%,10% 100%,0 60%,0 40%);
  display:grid; place-items:center; font-family:var(--font-code); font-size:11px; color:var(--ink-dim);
  transition:border-color .3s, background .3s;
}
.chip.done{ border-color:var(--good); color:var(--good); background:var(--panel2); }
.chip.current{ border-color:var(--danger); color:var(--amber-bright); box-shadow:0 0 10px rgba(255,59,59,.35); animation:chippulse 2s ease-in-out infinite; }
@keyframes chippulse{ 50%{ box-shadow:0 0 3px rgba(255,59,59,.2); } }

/* ---- title screen ---- */
.hero{ text-align:center; padding:60px 0 20px; }
.hero-stamp{
  display:inline-block; font-family:var(--font-code); font-size:12px; letter-spacing:.3em;
  color:var(--danger); border:1px solid var(--danger); padding:4px 14px; margin-bottom:22px;
  transform:rotate(-2deg);
}
.hero-title{
  font-family:var(--font-title); font-size:clamp(38px,8vw,68px); line-height:1.05; color:var(--ink);
  letter-spacing:.02em; text-shadow:0 0 22px rgba(232,163,61,.35), 2px 2px 0 rgba(0,0,0,.6);
}
.hero-title em{ color:var(--danger); font-style:normal; text-shadow:0 0 22px rgba(255,59,59,.5); }
.hero-sub{ font-family:var(--font-ui); font-size:15px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-dim); margin:14px 0 28px; }
.hero-brief{ max-width:52ch; margin:0 auto 34px; color:var(--ink-dim); font-size:15px; line-height:1.7; }
.hero-brief b{ color:var(--ink); }

/* ---- buttons ---- */
.btn{
  font-family:var(--font-ui); font-weight:600; font-size:15px; letter-spacing:.1em; text-transform:uppercase;
  padding:13px 30px; border:1px solid var(--olive); background:var(--panel2); color:var(--ink);
  clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);
  transition:background .15s, border-color .15s, transform .1s;
}
.btn:hover{ border-color:var(--amber); background:var(--olive-dim); transform:translateY(-1px); }
.btn-primary{ background:var(--danger); border-color:var(--danger); color:#180404; }
.btn-primary:hover{ background:#ff5c4a; border-color:#ff5c4a; }
.actions{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }

/* ---- brief screen ---- */
.brief-card{ background:var(--panel); border:1px solid var(--line); padding:30px 32px; }
.brief-diff{ font-family:var(--font-code); font-size:12px; color:var(--ink-dim); letter-spacing:.05em; margin-bottom:6px; }
.brief-diff::before{ content:"► "; color:var(--danger); }
.mission-name{ font-family:var(--font-title); font-size:30px; color:var(--ink); margin:8px 0 4px; }
.difficulty{
  display:inline-block; font-family:var(--font-code); font-size:11px; letter-spacing:.2em; color:var(--void);
  background:var(--amber); padding:3px 10px; margin-bottom:18px;
}
.brief-text{ color:var(--ink-dim); line-height:1.7; font-size:15px; margin-bottom:22px; }
.brief-file{ font-family:var(--font-code); font-size:13px; color:var(--alpha); margin-bottom:22px; }
.brief-file::before{ content:"FILE: "; color:var(--ink-dim); }

/* ---- code block ---- */
.filebar{
  font-family:var(--font-code); font-size:12px; color:var(--ink-dim); letter-spacing:.05em;
  border-bottom:1px dashed var(--line); padding-bottom:8px; margin-bottom:4px; display:flex; justify-content:space-between;
}
.codeblock{
  background:#070905; border:1px solid var(--line); padding:16px 20px; margin-bottom:22px;
  font-family:var(--font-code); font-size:16px; line-height:1.65; overflow-x:auto;
}
.cline{ color:#a9b39a; white-space:pre; }
.cline .kw{ color:#e8a33d; } .cline .str{ color:#8fc47a; } .cline .num{ color:#4fb3d9; } .cline .cm{ color:#5c6650; font-style:italic; }
.marker{ font-family:var(--font-code); font-size:13px; letter-spacing:.05em; padding:2px 0; }
.marker.a{ color:var(--alpha); } .marker.b{ color:var(--bravo); } .marker.mid{ color:var(--ink-dim); }
.zone{ padding:6px 10px; margin:2px 0; border-left:3px solid transparent; }
.zone.a{ background:var(--alpha-glow); border-left-color:var(--alpha-line); }
.zone.b{ background:var(--bravo-glow); border-left-color:var(--bravo-line); }
.zone.merged{ background:rgba(126,217,87,.1); border-left-color:var(--good); }

/* ---- tactical panel ---- */
.tactical-label{ font-family:var(--font-ui); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:10px; }
.tactical-label::before{ content:"◆ "; color:var(--danger); }
.tac-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-bottom:20px; }
.tac-btn{
  text-align:left; background:var(--panel); border:1px solid var(--line); padding:14px 16px;
  display:flex; flex-direction:column; gap:6px; transition:border-color .15s, background .15s, transform .1s;
}
.tac-btn:hover:not(:disabled){ border-color:var(--amber); background:var(--panel2); transform:translateX(3px); }
.tac-btn.chosen.correct{ border-color:var(--good); background:rgba(126,217,87,.08); }
.tac-btn.chosen.wrong{ border-color:var(--danger); background:rgba(255,59,59,.08); animation:tremor .35s ease; }
.tac-btn:disabled{ opacity:.55; cursor:not-allowed; }
@keyframes tremor{ 25%{transform:translateX(-4px)} 50%{transform:translateX(3px)} 75%{transform:translateX(-2px)} }
.tac-head{ display:flex; align-items:center; gap:9px; font-family:var(--font-ui); font-weight:600; font-size:13px; letter-spacing:.08em; text-transform:uppercase; }
.tac-head svg{ width:18px; height:18px; flex-shrink:0; }
.tac-preview{ font-family:var(--font-code); font-size:12px; color:var(--ink-dim); line-height:1.5; }

/* ---- debrief / hint ---- */
.debrief{ background:var(--panel); border-left:3px solid var(--danger); padding:16px 20px; margin-bottom:20px; }
.debrief.good{ border-left-color:var(--good); }
.debrief-title{ font-family:var(--font-ui); font-weight:600; font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--danger); margin-bottom:6px; }
.debrief.good .debrief-title{ color:var(--good); }
.debrief-text{ font-size:14px; line-height:1.7; color:var(--ink-dim); }
.hintbox{ background:var(--panel); border:1px dashed var(--line); padding:12px 16px; margin-bottom:18px; font-size:13px; color:var(--ink-dim); font-style:italic; }
.hintbox::before{ content:"SITREP: "; font-style:normal; font-family:var(--font-code); color:var(--amber); }

/* ---- mission complete stamp ---- */
.stamp-card{ text-align:center; padding:50px 20px; }
.stamp{
  display:inline-block; font-family:var(--font-title); font-size:30px; letter-spacing:.05em;
  border:4px solid var(--good); color:var(--good); padding:14px 26px; transform:rotate(-3deg); margin-bottom:24px;
}
.stamp.bad{ border-color:var(--danger); color:var(--danger); }
.stamp-sub{ color:var(--ink-dim); margin-bottom:30px; }

/* ---- final debrief ---- */
.final-card{ background:var(--panel); border:1px solid var(--line); padding:38px 30px; text-align:center; }
.rank{ font-family:var(--font-title); font-size:36px; margin-bottom:6px; }
.rank.gold{ color:var(--amber-bright); text-shadow:0 0 18px rgba(255,194,102,.5); }
.rank.silver{ color:#c9d1c4; text-shadow:0 0 14px rgba(200,210,196,.3); }
.rank.bronze{ color:#c98a4f; }
.rank-sub{ color:var(--ink-dim); font-style:italic; margin-bottom:26px; }
.stats{ display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin-bottom:28px; }
.stat-value{ font-family:var(--font-code); font-size:26px; color:var(--amber-bright); }
.stat-label{ font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.15em; }
.glossary{ text-align:left; background:var(--panel2); border:1px solid var(--line); padding:20px 24px; margin-bottom:28px; }
.glossary h3{ font-family:var(--font-ui); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--amber); margin-bottom:12px; }
.glossary dt{ font-family:var(--font-code); color:var(--alpha); font-size:13px; margin-top:10px; }
.glossary dd{ color:var(--ink-dim); font-size:13px; line-height:1.6; margin-top:2px; }

.spark{ position:fixed; top:-10px; pointer-events:none; z-index:45; border-radius:1px; animation:sparkfall linear forwards; }
@keyframes sparkfall{ 0%{transform:translateY(-5vh) translateX(0) rotate(0deg); opacity:1;} 100%{transform:translateY(105vh) translateX(4vw) rotate(180deg); opacity:0;} }

@media (max-width:600px){ .wrap{ padding:18px 14px 40px; } .hero-title{ font-size:42px; } .codeblock{ font-size:14px; } }
@media (prefers-reduced-motion:reduce){ *,*::before,*::after{ animation:none!important; transition:none!important; } }
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div class="radar"></div>
<div id="app"></div>
<script>
/* ============ ICONS ============ */
const ICON_ALPHA = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3z"/></svg>';
const ICON_BRAVO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3v6M12 15v6M3 12h6M15 12h6"/></svg>';
const ICON_MERGE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3v8a4 4 0 0 0 4 4h4M6 3l-3 3M6 3l3 3M18 21v-8a4 4 0 0 0-4-4h-4M18 21l-3-3M18 21l3-3"/></svg>';

/* ============ MISSION DATA ============ */
const MISSIONS = [
{
  id:1, codename:"FIRST CONTACT", difficulty:"RECRUIT", file:"patrol_config.js",
  briefing:`Two patrol units pushed changes to the same config file. HQ needs this resolved before the dawn rotation. One conflict. Read the evidence before you decide.`,
  hunks:[
    { before:["// patrol_config.js","// autogenerated — hand-edits require HQ sign-off",""],
      alpha:{branch:"HEAD (base camp)", lines:['const patrolSpeed = 80; // standard recon pace']},
      bravo:{branch:"bravo/turbo-fix", lines:['const patrolSpeed = 120; // raised after Checkpoint 4 ambush, field-tested 3x']},
      after:["", "function dispatch(){ return patrolSpeed; }"],
      allowCombine:false, correct:"bravo",
      rationale:`Bravo's line carries a field-tested justification — real evidence from the ambush. HEAD's value is just the untouched original. Lesson: read *why* a change was made, not only *what* it changed to.` }
  ]
},
{
  id:2, codename:"CROSSFIRE AT CHECKPOINT 7", difficulty:"RECRUIT", file:"squad_manifest.js",
  briefing:`Two unrelated edits landed in the same file. Resolve each on its own merits — one side isn't automatically right just because it's the incoming branch.`,
  hunks:[
    { before:["// squad_manifest.js"],
      alpha:{branch:"HEAD", lines:['const squadName = "Nightowls";']},
      bravo:{branch:"bravo/rename-squad", lines:['const squadName = "Ghost Vipers";']},
      after:[], allowCombine:false, correct:"bravo",
      rationale:`Official callsign memo #114 confirms the rename. Bravo's edit is intentional and current — this one's a clean swap.` },
    { before:["","function reportStatus(){"],
      alpha:{branch:"HEAD", lines:['  return "standing by";']},
      bravo:{branch:"bravo/rename-squad", lines:['  return "engaged";']},
      after:["}"], allowCombine:false, correct:"alpha",
      rationale:`Bravo's branch froze before the skirmish ended — that line is stale. HEAD reflects the live, current status. Lesson: the incoming branch isn't automatically "more correct." Check what each side actually knows.` }
  ]
},
{
  id:3, codename:"THE DOUBLE AGENT", difficulty:"FIELD AGENT", file:"extraction_manifest.js",
  briefing:`Both units added extraction steps independently. Nothing here is wrong — but the order you splice them in decides who makes it out.`,
  hunks:[
    { before:["// extraction_manifest.js","const extractionSteps = [];",""],
      alpha:{branch:"HEAD", lines:['extractionSteps.push("secure LZ");','extractionSteps.push("signal for pickup");']},
      bravo:{branch:"bravo/silent-approach", lines:['extractionSteps.push("neutralize watchtower");']},
      after:[], allowCombine:true, correct:"combine-ba",
      rationale:`Both steps are needed — this isn't a keep-one-side conflict. But sequence matters: the watchtower has to go dark BEFORE the LZ is secured, or the noise gives away the pickup. Lesson: some merges need both sides, in the right order.` }
  ]
},
{
  id:4, codename:"NESTED EXTRACTION", difficulty:"VETERAN", file:"dead_drop_protocol.js",
  briefing:`A rebase went sideways and left two related conflicts inside the same function. Resolve them as a matching set — a mismatch here breaks the whole drop.`,
  hunks:[
    { before:["// dead_drop_protocol.js"],
      alpha:{branch:"HEAD", lines:["function verifyDrop(code) {"]},
      bravo:{branch:"bravo/add-unit-check", lines:["function verifyDrop(code, unit) {"]},
      after:[], allowCombine:false, correct:"bravo",
      rationale:`Bravo's signature adds a unit parameter. Keep this in mind — the next conflict in this file depends on that parameter existing.` },
    { before:["  // ...function body"],
      alpha:{branch:"HEAD", lines:['  return code === "BLACKBIRD07";']},
      bravo:{branch:"bravo/add-unit-check", lines:['  return unit.clearance && code === "BLACKBIRD09";']},
      after:["}"], allowCombine:false, correct:"bravo",
      rationale:`This line only works with the parameter Bravo added above. Picking HEAD here — or mixing these two hunks from different sides — would reference a variable that doesn't exist. Related hunks must be resolved as a matching set, not in isolation.` }
  ]
},
{
  id:5, codename:"BLACKOUT PROTOCOL", difficulty:"VETERAN", file:"comm_relay.js", tension:3,
  briefing:`Final push. Full file, three conflicts, comms going dark soon. Everything you've learned, all at once.`,
  hunks:[
    { before:["// comm_relay.js"],
      alpha:{branch:"HEAD", lines:['const cipherKey = "RQ-114-OLD";']},
      bravo:{branch:"bravo/rotate-keys", lines:['const cipherKey = "RQ-119-ACTIVE";']},
      after:[], allowCombine:false, correct:"bravo",
      rationale:`Keys rotate. Trust the newest active key, verified against tonight's rotation schedule, over a stale one.` },
    { before:["","function relayTimeout(){"],
      alpha:{branch:"HEAD", lines:['  return 30; // seconds, matches HQ spec sheet']},
      bravo:{branch:"bravo/rotate-keys", lines:['  return 10; // copied from an unrelated relay, never verified']},
      after:["}"], allowCombine:false, correct:"alpha",
      rationale:`Bravo's value was borrowed from an unrelated relay and never checked against spec. HEAD matches the actual HQ spec sheet. A change looking newer doesn't mean it's been verified.` },
    { before:["","function logBoot(){"],
      alpha:{branch:"HEAD", lines:['  console.log("relay online");']},
      bravo:{branch:"bravo/rotate-keys", lines:['  console.log("cipher rotated");']},
      after:["}"], allowCombine:true, correct:"combine-ab",
      rationale:`Both log lines are independent diagnostics HQ wants in the boot log. Keep both — order doesn't affect execution here, only readability.` }
  ]
}
];

/* ============ STATE ============ */
const STORAGE_KEY = "merge_conflict_frontline_v1";
function freshProgress(){
  return { missionIndex:0, hunkIndex:0, morale:100, mistakes:0, hintsUsed:0, totalHunks:MISSIONS.reduce((a,m)=>a+m.hunks.length,0),
           missionMistakes:0, startTime:Date.now(), answered:false, hintShown:false };
}
function loadProgress(){
  try{ const s = localStorage.getItem(STORAGE_KEY); if(s) return Object.assign(freshProgress(), JSON.parse(s)); }catch(e){}
  return freshProgress();
}
function saveProgress(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }catch(e){} }
let progress = loadProgress();
let timerInterval;

/* ============ HELPERS ============ */
function el(html){ document.getElementById("app").innerHTML = html; }
function escapeHtml(s){ const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function hl(line){
  let s = escapeHtml(line);
  s = s.replace(/(\/\/.*$)/, '<span class="cm">$1</span>');
  s = s.replace(/\b(const|let|var|function|return|if|else|for)\b/g, '<span class="kw">$&</span>');
  s = s.replace(/"[^"]*"/g, m => '<span class="str">'+m+'</span>');
  s = s.replace(/\b\d+\b/g, '<span class="num">$&</span>');
  return s;
}
function moralePercent(){ return Math.max(0, progress.morale); }
function setMoraleUI(){ const f = document.querySelector(".morale-fill"); if(f) f.style.width = moralePercent()+"%"; }
function currentMission(){ return MISSIONS[progress.missionIndex]; }
function currentHunk(){ return currentMission().hunks[progress.hunkIndex]; }

function applyTension(mission){
  document.body.classList.remove("hb-1","hb-2","hb-3");
  if(mission.tension) document.body.classList.add("hb-"+mission.tension);
}

function startTimer(){
  clearInterval(timerInterval);
  const start = progress.startTime;
  timerInterval = setInterval(()=>{
    const el2 = document.querySelector(".clock");
    if(!el2) return;
    const t = Math.floor((Date.now()-start)/1000);
    el2.textContent = `${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;
  },1000);
}

function chips(){
  let h = '<div class="chips">';
  MISSIONS.forEach((m,i)=>{
    let cls = "";
    if(i < progress.missionIndex) cls = "done";
    else if(i === progress.missionIndex) cls = "current";
    h += `<div class="chip ${cls}">${i+1}</div>`;
  });
  return h + "</div>";
}

function topbar(){
  return `<div class="topbar">
    <div class="brand">MERGE CONFLICT: FRONTLINE<span>TACTICAL VERSION CONTROL DIVISION</span></div>
    <div class="hud-right">
      <div class="morale-wrap"><span class="morale-label">Squad Morale</span>
        <div class="morale-gauge"><span class="morale-fill" style="width:${moralePercent()}%"></span></div>
      </div>
      <div class="clock">00:00</div>
    </div>
  </div>`;
}

/* ============ SCREENS ============ */
function renderTitle(){
  clearInterval(timerInterval);
  document.body.classList.remove("hb-1","hb-2","hb-3");
  el(`<div class="wrap"><div class="hero screen">
    <div class="hero-stamp">TOP SECRET — EYES ONLY</div>
    <h1 class="hero-title">MERGE CONFLICT<br><em>: FRONTLINE</em></h1>
    <p class="hero-sub">A Git Conflict-Resolution Operation</p>
    <p class="hero-brief">Two units, two branches, one file. <b>HEAD</b> holds your position. <b>Incoming</b> is what the other unit is pushing. Every conflict is a call you make — hold your line, advance theirs, or combine both. Choose wrong, and Squad Morale takes the hit.</p>
    <div class="actions"><button class="btn btn-primary" onclick="startGame()">Deploy</button></div>
  </div></div>`);
}

function startGame(){
  progress = freshProgress();
  saveProgress();
  renderBrief();
}

function renderBrief(){
  clearInterval(timerInterval);
  const m = currentMission();
  applyTension(m);
  el(`<div class="wrap screen">
    ${topbar()}
    ${chips()}
    <div class="brief-card">
      <div class="brief-diff">INCOMING TRANSMISSION — MISSION ${m.id} OF ${MISSIONS.length}</div>
      <div class="mission-name">${m.codename}</div>
      <div class="difficulty">${m.difficulty}</div>
      <p class="brief-text">${m.briefing}</p>
      <div class="brief-file">${m.file} — ${m.hunks.length} conflict${m.hunks.length>1?"s":""} detected</div>
      <div class="actions"><button class="btn btn-primary" onclick="beginMission()">Begin Operation</button></div>
    </div>
  </div>`);
  startTimer();
}

function beginMission(){
  progress.hunkIndex = 0;
  progress.missionMistakes = 0;
  progress.answered = false;
  progress.hintShown = false;
  saveProgress();
  renderHunk();
}

function codeLines(arr, cls){
  return arr.map(l => l.trim()==="" ? '<div class="cline">&nbsp;</div>' : `<div class="cline ${cls||""}">${hl(l)}</div>`).join("");
}

function renderHunk(){
  const m = currentMission();
  const h = currentHunk();
  applyTension(m);
  let choices = [
    { id:"alpha", label:"Hold Alpha (HEAD)", icon:ICON_ALPHA, preview:h.alpha.lines.join("  ") },
    { id:"bravo", label:"Advance Bravo (incoming)", icon:ICON_BRAVO, preview:h.bravo.lines.join("  ") }
  ];
  if(h.allowCombine){
    choices.push({ id:"combine-ab", label:"Combine — Alpha then Bravo", icon:ICON_MERGE, preview:h.alpha.lines.concat(h.bravo.lines).join("  ") });
    choices.push({ id:"combine-ba", label:"Combine — Bravo then Alpha", icon:ICON_MERGE, preview:h.bravo.lines.concat(h.alpha.lines).join("  ") });
  }

  let tacHtml = choices.map(c => `
    <button class="tac-btn" id="tac-${c.id}" onclick="selectChoice('${c.id}')">
      <div class="tac-head">${c.icon}<span>${c.label}</span></div>
      <div class="tac-preview">${escapeHtml(c.preview)}</div>
    </button>`).join("");

  el(`<div class="wrap screen">
    ${topbar()}
    ${chips()}
    <div class="filebar"><span>${m.file}</span><span>CONFLICT ${progress.hunkIndex+1} / ${m.hunks.length}</span></div>
    <div class="codeblock">
      ${codeLines(h.before)}
      <div class="marker a">&lt;&lt;&lt;&lt;&lt;&lt;&lt; ${h.alpha.branch}</div>
      <div class="zone a">${codeLines(h.alpha.lines)}</div>
      <div class="marker mid">=======</div>
      <div class="zone b">${codeLines(h.bravo.lines)}</div>
      <div class="marker b">&gt;&gt;&gt;&gt;&gt;&gt;&gt; ${h.bravo.branch}</div>
      ${codeLines(h.after)}
    </div>
    <div id="hint-area"></div>
    <div class="tactical-label">Tactical Decision</div>
    <div class="tac-grid">${tacHtml}</div>
    <div id="debrief-area"></div>
    <div class="actions">
      <button class="btn" onclick="showHint()">Request SITREP (−5 morale)</button>
    </div>
  </div>`);
  startTimer();
}

function showHint(){
  if(progress.answered || progress.hintShown) return;
  progress.hintShown = true;
  progress.morale = Math.max(0, progress.morale - 5);
  saveProgress();
  setMoraleUI();
  const h = currentHunk();
  const clue = h.rationale.split(".")[0] + ".";
  document.getElementById("hint-area").innerHTML = `<div class="hintbox">${clue}</div>`;
}

function selectChoice(id){
  if(progress.answered) return;
  progress.answered = true;
  const h = currentHunk();
  const correct = id === h.correct;
  document.querySelectorAll(".tac-btn").forEach(b => b.disabled = true);
  const chosenBtn = document.getElementById("tac-"+id);
  chosenBtn.classList.add("chosen", correct ? "correct" : "wrong");

  if(!correct){
    progress.morale = Math.max(0, progress.morale - 15);
    progress.mistakes++;
    progress.missionMistakes++;
    saveProgress();
    setMoraleUI();
    document.body.classList.add("alert");
    setTimeout(()=>document.body.classList.remove("alert"), 1000);
  } else {
    saveProgress();
  }

  document.getElementById("debrief-area").innerHTML = `<div class="debrief ${correct?"good":""}">
      <div class="debrief-title">${correct ? "Line Held" : "Position Compromised"}</div>
      <div class="debrief-text">${h.rationale}</div>
    </div>
    <div class="actions" style="margin-top:16px"><button class="btn btn-primary" onclick="nextHunk()">Continue</button></div>`;
}

function nextHunk(){
  const m = currentMission();
  progress.hunkIndex++;
  progress.answered = false;
  progress.hintShown = false;
  saveProgress();
  if(progress.hunkIndex >= m.hunks.length){
    renderMissionComplete();
  } else {
    renderHunk();
  }
}

function renderMissionComplete(){
  clearInterval(timerInterval);
  const success = progress.missionMistakes === 0;
  el(`<div class="wrap screen">
    ${topbar()}
    ${chips()}
    <div class="stamp-card">
      <div class="stamp ${success?"":"bad"}">${success ? "OBJECTIVE SECURED" : "OBJECTIVE COMPROMISED"}</div>
      <p class="stamp-sub">${success ? "Clean resolution. HQ is pleased." : `Resolved with ${progress.missionMistakes} misstep${progress.missionMistakes>1?"s":""}. The mission continues.`}</p>
      <div class="actions"><button class="btn btn-primary" onclick="advanceMission()">${progress.missionIndex+1 < MISSIONS.length ? "Next Mission" : "Return to HQ"}</button></div>
    </div>
  </div>`);
}

function advanceMission(){
  progress.missionIndex++;
  saveProgress();
  if(progress.missionIndex >= MISSIONS.length){
    renderFinalDebrief();
  } else {
    renderBrief();
  }
}

function renderFinalDebrief(){
  clearInterval(timerInterval);
  document.body.classList.remove("hb-1","hb-2","hb-3");
  const totalTime = Math.floor((Date.now()-progress.startTime)/1000);
  const accuracy = Math.round(((progress.totalHunks - progress.mistakes) / progress.totalHunks) * 100);
  let rankClass, rankName, rankSub;
  if(progress.mistakes === 0){ rankClass="gold"; rankName="COMMENDED"; rankSub="A flawless merge record. HQ is naming a training module after you."; }
  else if(progress.mistakes <= 2){ rankClass="silver"; rankName="FIELD PROMOTION"; rankSub="Solid work under pressure. A few calls cost you morale, not the mission."; }
  else { rankClass="bronze"; rankName="HONORABLE DISCHARGE"; rankSub="You made it through. Debrief carefully — some of these conflicts will come back."; }

  el(`<div class="wrap screen">
    <div class="final-card">
      <div class="brief-diff">MISSION SERIES COMPLETE</div>
      <div class="rank ${rankClass}">${rankName}</div>
      <p class="rank-sub">${rankSub}</p>
      <div class="stats">
        <div class="stat"><div class="stat-value">${accuracy}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat"><div class="stat-value">${moralePercent()}%</div><div class="stat-label">Morale Left</div></div>
        <div class="stat"><div class="stat-value">${String(Math.floor(totalTime/60)).padStart(2,"0")}:${String(totalTime%60).padStart(2,"0")}</div><div class="stat-label">Op Clock</div></div>
      </div>
      <div class="glossary">
        <h3>Field Manual — What You Learned</h3>
        <dl>
          <dt>HEAD vs incoming</dt><dd>HEAD is your current branch's version; incoming (often labeled by the other branch's name) is what's being merged in. Neither one wins by default.</dd>
          <dt>&lt;&lt;&lt;&lt;&lt;&lt;&lt; ======= &gt;&gt;&gt;&gt;&gt;&gt;&gt;</dt><dd>Real Git conflict markers. Everything between the first marker and the divider is HEAD's version; everything between the divider and the closing marker is incoming's.</dd>
          <dt>Keep one side</dt><dd>Use when one version is simply more correct or more current — verify with evidence, not just "which branch is newer."</dd>
          <dt>Combine both, in order</dt><dd>Some conflicts aren't really conflicts — both changes are needed. Sequence can still matter even when the text overlaps.</dd>
          <dt>Related hunks</dt><dd>When two conflicts in the same file depend on each other, resolve them as a consistent set — mixing sides can reference things that no longer exist.</dd>
        </dl>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="startGame()">Run It Back</button>
        <button class="btn" onclick="renderTitle()">Stand Down</button>
      </div>
    </div>
  </div>`);
  if(progress.mistakes <= 2) launchSparks();
}

function launchSparks(){
  if(window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  for(let i=0;i<36;i++){
    const s = document.createElement("div");
    const size = 2 + Math.random()*3;
    s.className = "spark";
    s.style.cssText = `left:${Math.random()*100}vw;width:${size}px;height:${size}px;background:${Math.random()>0.5?"#ffc266":"#e8543d"};animation-duration:${3+Math.random()*3}s;animation-delay:${Math.random()*1.2}s`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 8000);
  }
}

renderTitle();
</script>
</body>
</html>
