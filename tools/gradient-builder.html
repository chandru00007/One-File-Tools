<!--
Gradient Builder
Single-file client-side tool to visually build CSS linear/radial gradients
with multiple color stops, live preview, and copy-ready CSS.
Built for One File Tools.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradient Builder - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #f472b6;
        --accent-hover: #ec4899;
        --accent-glow: rgba(244, 114, 182, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 20px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
        --color-weak: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 100%;
        max-width: 900px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 580px;
        margin: 0 auto;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: block;
        margin-bottom: 14px;
      }

      .preview-box {
        height: 220px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--panel-border);
      }

      .type-tabs {
        display: flex;
        gap: 6px;
        margin: 16px 0;
      }

      .type-tab {
        flex: 1;
        background: rgba(31, 41, 55, 0.5);
        border: 1px solid var(--panel-border);
        color: var(--text-muted);
        border-radius: 8px;
        padding: 9px 14px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .type-tab.active {
        background: var(--accent);
        color: #030712;
        border-color: var(--accent);
      }

      .type-tab:hover:not(.active) {
        background: rgba(55, 65, 81, 0.7);
      }

      .type-tab:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .controls-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 16px;
      }

      .control label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 6px;
      }

      .control select,
      .control input[type="number"] {
        width: 100%;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 14px;
        padding: 9px 10px;
      }

      .control select:focus,
      .control input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .control input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .preset-dirs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      .preset-dirs button {
        background: rgba(31, 41, 55, 0.5);
        border: 1px solid var(--panel-border);
        color: var(--text-muted);
        border-radius: 6px;
        padding: 6px 10px;
        font-family: var(--font-mono);
        font-size: 12px;
        cursor: pointer;
      }

      .preset-dirs button:hover {
        background: rgba(55, 65, 81, 0.7);
        color: var(--text);
      }

      /* Color stops */
      .stops-track {
        position: relative;
        height: 36px;
        border-radius: 99px;
        margin-bottom: 10px;
        border: 1px solid var(--panel-border);
      }

      .stop-handle {
        position: absolute;
        top: 50%;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
        transform: translate(-50%, -50%);
        cursor: grab;
      }

      .stop-handle.active {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .stop-row {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        margin-bottom: 8px;
      }

      .stop-row input[type="color"] {
        width: 36px;
        height: 36px;
        padding: 2px;
        border-radius: 6px;
        cursor: pointer;
        flex-shrink: 0;
      }

      .stop-row input[type="text"] {
        width: 90px;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        padding: 8px 10px;
      }

      .stop-row input[type="number"] {
        width: 70px;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        padding: 8px 10px;
      }

      .stop-row .stop-actions {
        display: flex;
        gap: 4px;
        margin-left: auto;
      }

      .icon-btn-sm {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text-muted);
        border-radius: 6px;
        width: 30px;
        height: 30px;
        cursor: pointer;
        font-size: 14px;
      }

      .icon-btn-sm:hover {
        background: rgba(55, 65, 81, 0.9);
        color: var(--text);
      }

      .btn {
        background: var(--accent);
        color: #030712;
        border: none;
        border-radius: 8px;
        padding: 11px 18px;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .btn:hover {
        background: var(--accent-hover);
      }

      .btn:focus-visible,
      .btn-ghost:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-ghost {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text);
        border-radius: 8px;
        padding: 11px 16px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-ghost:hover {
        background: rgba(55, 65, 81, 0.8);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .code-block {
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.7;
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        margin-top: 14px;
        color: var(--text);
      }

      .footer-note {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
      }

      .footer-note a {
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 22px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 640px) {
        .studio {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Color Tools</div>
        <h1 class="wordmark">Gradient Builder</h1>
        <p class="tagline">Visually build linear or radial CSS gradients with multiple color stops, then copy production-ready CSS.</p>
      </header>

      <main class="studio">
        <div class="preview-box" id="previewBox"></div>

        <div class="type-tabs" role="tablist">
          <button class="type-tab active" id="tabLinear" type="button" role="tab" aria-selected="true">Linear</button>
          <button class="type-tab" id="tabRadial" type="button" role="tab" aria-selected="false">Radial</button>
        </div>

        <div class="controls-grid" id="linearControls">
          <div class="control">
            <label for="angleRange">Angle</label>
            <input type="range" id="angleRange" min="0" max="360" step="1" value="90" />
            <div id="angleValue" style="font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 4px">90deg</div>
          </div>
          <div class="control">
            <label>Presets</label>
            <div class="preset-dirs" id="presetDirs"></div>
          </div>
        </div>

        <div class="controls-grid" id="radialControls" style="display: none">
          <div class="control">
            <label for="shapeSelect">Shape</label>
            <select id="shapeSelect">
              <option value="circle">Circle</option>
              <option value="ellipse" selected>Ellipse</option>
            </select>
          </div>
          <div class="control">
            <label for="positionSelect">Position</label>
            <select id="positionSelect">
              <option value="center">Center</option>
              <option value="top">Top</option>
              <option value="bottom">Bottom</option>
              <option value="left">Left</option>
              <option value="right">Right</option>
              <option value="top left">Top left</option>
              <option value="top right">Top right</option>
              <option value="bottom left">Bottom left</option>
              <option value="bottom right">Bottom right</option>
            </select>
          </div>
        </div>
      </main>

      <main class="studio">
        <span class="section-label">Color stops</span>
        <div class="stops-track" id="stopsTrack"></div>
        <div id="stopsList"></div>
        <button class="btn-ghost" id="btnAddStop" type="button">+ Add color stop</button>
      </main>

      <main class="studio">
        <span class="section-label">
          Generated CSS
        </span>
        <div class="code-block" id="cssOutput"></div>
        <div class="actions">
          <button class="btn" id="btnCopyCss" type="button">Copy CSS</button>
          <button class="btn-ghost" id="btnDownloadCss" type="button">Download .css</button>
          <button class="btn-ghost" id="btnReset" type="button">Reset</button>
        </div>
      </main>

      <p class="footer-note">Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a>. Runs completely offline.</p>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      /* ==========================================================
         Gradient Builder
         Vanilla JS, no dependencies.
         ========================================================== */

      const previewBox = document.getElementById("previewBox");
      const tabLinear = document.getElementById("tabLinear");
      const tabRadial = document.getElementById("tabRadial");
      const linearControls = document.getElementById("linearControls");
      const radialControls = document.getElementById("radialControls");
      const angleRange = document.getElementById("angleRange");
      const angleValue = document.getElementById("angleValue");
      const presetDirs = document.getElementById("presetDirs");
      const shapeSelect = document.getElementById("shapeSelect");
      const positionSelect = document.getElementById("positionSelect");
      const stopsTrack = document.getElementById("stopsTrack");
      const stopsList = document.getElementById("stopsList");
      const btnAddStop = document.getElementById("btnAddStop");
      const cssOutput = document.getElementById("cssOutput");
      const btnCopyCss = document.getElementById("btnCopyCss");
      const btnDownloadCss = document.getElementById("btnDownloadCss");
      const btnReset = document.getElementById("btnReset");
      const toast = document.getElementById("toast");

      const PRESET_DIRECTIONS = [
        { label: "Top", angle: 0 },
        { label: "Right", angle: 90 },
        { label: "Bottom", angle: 180 },
        { label: "Left", angle: 270 },
        { label: "Diagonal", angle: 45 }
      ];

      let gradientType = "linear";
      let stopIdCounter = 0;
      let stops = [];
      let draggingStopId = null;

      function defaultStops() {
        stopIdCounter = 0;
        return [
          { id: ++stopIdCounter, color: "#f472b6", position: 0 },
          { id: ++stopIdCounter, color: "#8b5cf6", position: 100 }
        ];
      }
      stops = defaultStops();

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      function copyText(text, message) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(text)
            .then(() => showToast(message))
            .catch(() => showToast("Copy failed"));
        } else {
          showToast("Clipboard unavailable");
        }
      }

      /** Builds the CSS gradient() function string from current state. */
      function buildGradientCss() {
        const sorted = [...stops].sort((a, b) => a.position - b.position);
        const stopsCss = sorted.map((s) => s.color + " " + s.position + "%").join(", ");

        if (gradientType === "linear") {
          return "linear-gradient(" + angleRange.value + "deg, " + stopsCss + ")";
        }
        return "radial-gradient(" + shapeSelect.value + " at " + positionSelect.value + ", " + stopsCss + ")";
      }

      /** Renders the live preview and generated CSS block. */
      function render() {
        const gradientCss = buildGradientCss();
        previewBox.style.background = gradientCss;

        const css = "background: " + gradientCss + ";\nbackground-image: " + gradientCss + ";";
        cssOutput.textContent = css;

        renderStopsTrack();
        renderStopsList();
      }

      /** Renders the draggable stop handles on the gradient bar. */
      function renderStopsTrack() {
        stopsTrack.innerHTML = "";
        stopsTrack.style.background = buildGradientCss();

        stops.forEach((stop) => {
          const handle = document.createElement("div");
          handle.className = "stop-handle";
          handle.style.left = stop.position + "%";
          handle.style.background = stop.color;
          handle.dataset.stopId = stop.id;
          handle.tabIndex = 0;
          handle.setAttribute("role", "slider");
          handle.setAttribute("aria-label", "Color stop at " + stop.position + "%");
          handle.setAttribute("aria-valuenow", String(stop.position));

          handle.addEventListener("pointerdown", (event) => {
            draggingStopId = stop.id;
            event.preventDefault();
          });

          handle.addEventListener("keydown", (event) => {
            const s = stops.find((x) => x.id === stop.id);
            if (!s) return;
            if (event.key === "ArrowLeft") {
              s.position = Math.max(0, s.position - 1);
              render();
            } else if (event.key === "ArrowRight") {
              s.position = Math.min(100, s.position + 1);
              render();
            }
          });

          stopsTrack.appendChild(handle);
        });
      }

      stopsTrack.addEventListener("pointermove", (event) => {
        if (draggingStopId === null) return;
        const rect = stopsTrack.getBoundingClientRect();
        let pct = ((event.clientX - rect.left) / rect.width) * 100;
        pct = Math.max(0, Math.min(100, Math.round(pct)));
        const stop = stops.find((s) => s.id === draggingStopId);
        if (stop) {
          stop.position = pct;
          render();
        }
      });

      window.addEventListener("pointerup", () => {
        draggingStopId = null;
      });

      /** Renders the editable list of color stop rows. */
      function renderStopsList() {
        stopsList.innerHTML = "";
        stops.forEach((stop) => {
          const row = document.createElement("div");
          row.className = "stop-row";

          const colorInput = document.createElement("input");
          colorInput.type = "color";
          colorInput.value = stop.color;
          colorInput.addEventListener("input", () => {
            stop.color = colorInput.value;
            render();
          });

          const hexInput = document.createElement("input");
          hexInput.type = "text";
          hexInput.value = stop.color;
          hexInput.spellcheck = false;
          hexInput.addEventListener("input", () => {
            if (/^#[0-9a-f]{6}$/i.test(hexInput.value)) {
              stop.color = hexInput.value;
              render();
            }
          });

          const posInput = document.createElement("input");
          posInput.type = "number";
          posInput.min = "0";
          posInput.max = "100";
          posInput.value = stop.position;
          posInput.addEventListener("input", () => {
            const val = Math.max(0, Math.min(100, parseInt(posInput.value, 10) || 0));
            stop.position = val;
            render();
          });

          const actions = document.createElement("div");
          actions.className = "stop-actions";
          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "icon-btn-sm";
          removeBtn.textContent = "✕";
          removeBtn.title = "Remove stop";
          removeBtn.disabled = stops.length <= 2;
          removeBtn.addEventListener("click", () => {
            if (stops.length <= 2) return;
            stops = stops.filter((s) => s.id !== stop.id);
            render();
          });
          actions.appendChild(removeBtn);

          row.appendChild(colorInput);
          row.appendChild(hexInput);
          row.appendChild(posInput);
          row.appendChild(document.createTextNode("%"));
          row.appendChild(actions);
          stopsList.appendChild(row);
        });
      }

      // ---- Events ----

      tabLinear.addEventListener("click", () => {
        gradientType = "linear";
        tabLinear.classList.add("active");
        tabRadial.classList.remove("active");
        tabLinear.setAttribute("aria-selected", "true");
        tabRadial.setAttribute("aria-selected", "false");
        linearControls.style.display = "grid";
        radialControls.style.display = "none";
        render();
      });

      tabRadial.addEventListener("click", () => {
        gradientType = "radial";
        tabRadial.classList.add("active");
        tabLinear.classList.remove("active");
        tabRadial.setAttribute("aria-selected", "true");
        tabLinear.setAttribute("aria-selected", "false");
        linearControls.style.display = "none";
        radialControls.style.display = "grid";
        render();
      });

      angleRange.addEventListener("input", () => {
        angleValue.textContent = angleRange.value + "deg";
        render();
      });

      PRESET_DIRECTIONS.forEach((dir) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = dir.label;
        btn.addEventListener("click", () => {
          angleRange.value = dir.angle;
          angleValue.textContent = dir.angle + "deg";
          render();
        });
        presetDirs.appendChild(btn);
      });

      shapeSelect.addEventListener("change", render);
      positionSelect.addEventListener("change", render);

      btnAddStop.addEventListener("click", () => {
        stopIdCounter += 1;
        stops.push({ id: stopIdCounter, color: "#ffffff", position: 50 });
        render();
      });

      btnCopyCss.addEventListener("click", () => copyText(cssOutput.textContent, "CSS copied!"));

      btnDownloadCss.addEventListener("click", () => {
        const blob = new Blob([cssOutput.textContent], { type: "text/css" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = "gradient.css";
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        setTimeout(() => URL.revokeObjectURL(url), 0);
      });

      btnReset.addEventListener("click", () => {
        stops = defaultStops();
        angleRange.value = 90;
        angleValue.textContent = "90deg";
        shapeSelect.value = "ellipse";
        positionSelect.value = "center";
        gradientType = "linear";
        tabLinear.click();
        render();
      });

      render();
    </script>
  </body>
</html>
