<!--
Timestamp Converter
Single-file client-side tool to convert between Unix timestamps and
human-readable dates, in both directions.
Built for One File Tools.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timestamp Converter - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #60a5fa;
        --accent-hover: #3b82f6;
        --accent-glow: rgba(96, 165, 250, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 20px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
        --color-weak: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 100%;
        max-width: 860px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 580px;
        margin: 0 auto;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: block;
        margin-bottom: 14px;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-end;
      }

      .field {
        flex: 1;
        min-width: 180px;
      }

      .field label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 6px;
      }

      .field input,
      .field select {
        width: 100%;
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 14px;
        padding: 10px 12px;
      }

      .field input:focus,
      .field select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .field-error {
        font-size: 12px;
        color: var(--color-weak);
        margin-top: 8px;
        min-height: 14px;
      }

      .btn {
        background: var(--accent);
        color: #030712;
        border: none;
        border-radius: 8px;
        padding: 10px 16px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }

      .btn:hover {
        background: var(--accent-hover);
      }

      .btn:focus-visible,
      .btn-ghost:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-ghost {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 16px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-ghost:hover {
        background: rgba(55, 65, 81, 0.8);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .result-card {
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .result-card .info {
        min-width: 0;
      }

      .result-card .label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      .result-card .value {
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--text);
        word-break: break-word;
      }

      .copy-btn-sm {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text-muted);
        border-radius: 6px;
        padding: 6px 9px;
        font-size: 11px;
        font-family: var(--font-sans);
        cursor: pointer;
        flex-shrink: 0;
      }

      .copy-btn-sm:hover {
        background: rgba(55, 65, 81, 0.9);
        color: var(--text);
      }

      .footer-note {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
      }

      .footer-note a {
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 22px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 640px) {
        .studio {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div class="eyebrow">Developer Utilities</div>
        <h1 class="wordmark">Timestamp Converter</h1>
        <p class="tagline">Convert Unix timestamps to human-readable dates, or dates back to Unix time — instantly, in both directions.</p>
      </header>

      <main class="studio">
        <span class="section-label">Unix timestamp → Date</span>
        <div class="row">
          <div class="field">
            <label for="unixInput">Timestamp</label>
            <input type="text" id="unixInput" placeholder="e.g. 1700000000" spellcheck="false" />
          </div>
          <div class="field" style="flex: 0 0 140px">
            <label for="unitSelect">Unit</label>
            <select id="unitSelect">
              <option value="seconds">Seconds</option>
              <option value="milliseconds">Milliseconds</option>
            </select>
          </div>
          <button class="btn" id="btnUseNow" type="button">Use current time</button>
        </div>
        <div class="field-error" id="unixError"></div>
      </main>

      <main class="studio">
        <span class="section-label">Date → Unix timestamp</span>
        <div class="row">
          <div class="field">
            <label for="dateInput">Date &amp; time (local)</label>
            <input type="datetime-local" id="dateInput" step="1" />
          </div>
        </div>
        <div class="field-error" id="dateError"></div>
      </main>

      <main class="studio">
        <span class="section-label">Results</span>
        <div class="result-grid" id="resultGrid"></div>
        <div class="actions">
          <button class="btn-ghost" id="btnClear" type="button">Clear</button>
        </div>
      </main>

      <p class="footer-note">Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a>. Runs completely offline.</p>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      /* ==========================================================
         Timestamp Converter
         Vanilla JS, no dependencies.
         ========================================================== */

      const unixInput = document.getElementById("unixInput");
      const unitSelect = document.getElementById("unitSelect");
      const unixError = document.getElementById("unixError");
      const btnUseNow = document.getElementById("btnUseNow");
      const dateInput = document.getElementById("dateInput");
      const dateError = document.getElementById("dateError");
      const resultGrid = document.getElementById("resultGrid");
      const btnClear = document.getElementById("btnClear");
      const toast = document.getElementById("toast");

      // Which field the user edited most recently — determines which input
      // drives the results when both could theoretically produce a date.
      let activeSource = null; // "unix" | "date"

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function copyText(text, message) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(text)
            .then(() => showToast(message))
            .catch(() => showToast("Copy failed"));
        } else {
          showToast("Clipboard unavailable");
        }
      }

      /** Pads a number to 2 digits. */
      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      /** Formats a Date as an ISO-like "YYYY-MM-DD HH:MM:SS" string in the given timezone context. */
      function formatDate(date, useUtc) {
        const y = useUtc ? date.getUTCFullYear() : date.getFullYear();
        const mo = pad2((useUtc ? date.getUTCMonth() : date.getMonth()) + 1);
        const d = pad2(useUtc ? date.getUTCDate() : date.getDate());
        const h = pad2(useUtc ? date.getUTCHours() : date.getHours());
        const mi = pad2(useUtc ? date.getUTCMinutes() : date.getMinutes());
        const s = pad2(useUtc ? date.getUTCSeconds() : date.getSeconds());
        return y + "-" + mo + "-" + d + " " + h + ":" + mi + ":" + s;
      }

      /** Converts a Date to the local <input type="datetime-local"> value format. */
      function toDatetimeLocalValue(date) {
        return date.getFullYear() + "-" + pad2(date.getMonth() + 1) + "-" + pad2(date.getDate()) + "T" + pad2(date.getHours()) + ":" + pad2(date.getMinutes()) + ":" + pad2(date.getSeconds());
      }

      /** Renders the result cards for a resolved Date object, or clears them if null. */
      function renderResults(date) {
        resultGrid.innerHTML = "";
        if (!date || isNaN(date.getTime())) return;

        const cards = [
          { label: "Unix (seconds)", value: Math.floor(date.getTime() / 1000).toString() },
          { label: "Unix (milliseconds)", value: date.getTime().toString() },
          { label: "Local time", value: formatDate(date, false) },
          { label: "UTC time", value: formatDate(date, true) },
          { label: "ISO 8601", value: date.toISOString() },
          { label: "Relative", value: relativeTime(date) }
        ];

        cards.forEach((card) => {
          const div = document.createElement("div");
          div.className = "result-card";
          const info = document.createElement("div");
          info.className = "info";
          const label = document.createElement("div");
          label.className = "label";
          label.textContent = card.label;
          const value = document.createElement("div");
          value.className = "value";
          value.textContent = card.value;
          info.appendChild(label);
          info.appendChild(value);

          const copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className = "copy-btn-sm";
          copyBtn.textContent = "Copy";
          copyBtn.addEventListener("click", () => copyText(card.value, "Copied " + card.label));

          div.appendChild(info);
          div.appendChild(copyBtn);
          resultGrid.appendChild(div);
        });
      }

      /** Builds a short human-readable "X ago / in X" string relative to now. */
      function relativeTime(date) {
        const diffMs = date.getTime() - Date.now();
        const diffSec = Math.round(diffMs / 1000);
        const abs = Math.abs(diffSec);

        const units = [
          { name: "year", secs: 31536000 },
          { name: "month", secs: 2592000 },
          { name: "day", secs: 86400 },
          { name: "hour", secs: 3600 },
          { name: "minute", secs: 60 },
          { name: "second", secs: 1 }
        ];

        for (const unit of units) {
          if (abs >= unit.secs || unit.name === "second") {
            const count = Math.floor(abs / unit.secs);
            const plural = count === 1 ? "" : "s";
            return diffSec >= 0 ? "in " + count + " " + unit.name + plural : count + " " + unit.name + plural + " ago";
          }
        }
        return "just now";
      }

      /** Parses the unix timestamp field into a Date, updating the error message. */
      function parseUnixField() {
        unixError.textContent = "";
        const raw = unixInput.value.trim();
        if (raw === "") return null;

        if (!/^-?\d+$/.test(raw)) {
          unixError.textContent = "Enter a whole number (e.g. 1700000000).";
          return null;
        }

        const num = Number(raw);
        const ms = unitSelect.value === "seconds" ? num * 1000 : num;
        const date = new Date(ms);
        if (isNaN(date.getTime())) {
          unixError.textContent = "That value is out of range for a valid date.";
          return null;
        }
        return date;
      }

      /** Parses the datetime-local field into a Date, updating the error message. */
      function parseDateField() {
        dateError.textContent = "";
        const raw = dateInput.value;
        if (!raw) return null;

        const date = new Date(raw);
        if (isNaN(date.getTime())) {
          dateError.textContent = "Enter a valid date and time.";
          return null;
        }
        return date;
      }

      /** Re-renders results from whichever field was most recently edited. */
      function render() {
        if (activeSource === "date") {
          renderResults(parseDateField());
        } else {
          renderResults(parseUnixField());
        }
      }

      unixInput.addEventListener("input", () => {
        activeSource = "unix";
        render();
      });
      unitSelect.addEventListener("change", () => {
        activeSource = "unix";
        render();
      });
      dateInput.addEventListener("input", () => {
        activeSource = "date";
        render();
      });

      btnUseNow.addEventListener("click", () => {
        const now = new Date();
        unitSelect.value = "seconds";
        unixInput.value = Math.floor(now.getTime() / 1000).toString();
        dateInput.value = toDatetimeLocalValue(now);
        activeSource = "unix";
        render();
      });

      btnClear.addEventListener("click", () => {
        unixInput.value = "";
        dateInput.value = "";
        unixError.textContent = "";
        dateError.textContent = "";
        activeSource = null;
        resultGrid.innerHTML = "";
        unixInput.focus();
      });

      // Seed with the current time so the tool is useful at a glance on load.
      btnUseNow.click();
    </script>
  </body>
</html>
