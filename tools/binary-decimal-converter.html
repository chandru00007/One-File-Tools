<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Convert between binary, decimal, hexadecimal, and octal number systems." />
    <title>Number System Converter — One File Tools</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #fafafa;
        --surface: #f1f5f9;
        --text: #1a1a1a;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #2563eb;
        --radius: 8px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --surface: #1a1a1a;
          --text: #e5e5e5;
          --muted: #94a3b8;
          --border: #334155;
          --accent: #3b82f6;
        }
      }
      body {
        font-family: system-ui, sans-serif;
        line-height: 1.6;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      header {
        text-align: center;
        margin-bottom: 2rem;
      }
      header h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      header p {
        color: var(--muted);
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-header {
        font-weight: 600;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      input {
        width: 100%;
        padding: 0.875rem;
        font-size: 1.25rem;
        font-family: monospace;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg);
        color: var(--text);
        text-align: center;
        letter-spacing: 0.05em;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .results {
        text-align: center;
      }
      .result-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border);
      }
      .result-row:last-child {
        border-bottom: none;
      }
      .result-label {
        font-weight: 500;
      }
      .result-value {
        font-family: monospace;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        transition: background 0.2s;
        color: var(--text);
      }
      .result-value:hover {
        background: var(--border);
      }
      .result-value.copied {
        background: rgba(22, 163, 74, 0.2);
      }
      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .tab {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        font-size: 0.875rem;
      }
      .tab.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .bits {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 4px;
        margin-top: 1rem;
      }
      .bit {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .bit-0 {
        background: var(--border);
        color: var(--muted);
      }
      .bit-1 {
        background: var(--accent);
        color: white;
      }
      footer {
        text-align: center;
        padding: 2rem;
        color: var(--muted);
        font-size: 0.875rem;
      }
      footer a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🔢 Number System Converter</h1>
        <p>Convert between binary, decimal, hex, and octal</p>
      </header>

      <div class="card">
        <div class="card-header">
          <span>Enter Number</span>
          <div class="tabs">
            <button class="tab active" data-base="10">DEC</button>
            <button class="tab" data-base="2">BIN</button>
            <button class="tab" data-base="16">HEX</button>
            <button class="tab" data-base="8">OCT</button>
          </div>
        </div>
        <input type="text" id="input" placeholder="Enter decimal number..." value="42" />
      </div>

      <div class="card">
        <div class="card-header">Conversions</div>
        <div class="results">
          <div class="result-row"><span class="result-label">Binary (BIN)</span><span class="result-value" id="bin" data-val="101010">101010</span></div>
          <div class="result-row"><span class="result-label">Decimal (DEC)</span><span class="result-value" id="dec" data-val="42">42</span></div>
          <div class="result-row"><span class="result-label">Hexadecimal (HEX)</span><span class="result-value" id="hex" data-val="2A">2A</span></div>
          <div class="result-row"><span class="result-label">Octal (OCT)</span><span class="result-value" id="oct" data-val="52">52</span></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Binary Bit Display</div>
        <div class="bits" id="bits"></div>
      </div>
    </div>

    <footer>
      <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
      var currentBase = 10;
      var input = document.getElementById("input");
      var bits = document.getElementById("bits");

      document.querySelectorAll(".tab").forEach(function (tab) {
        tab.onclick = function () {
          document.querySelectorAll(".tab").forEach(function (t) {
            t.classList.remove("active");
          });
          tab.classList.add("active");
          currentBase = parseInt(tab.dataset.base);
          var labels = { 10: "decimal", 2: "binary", 16: "hexadecimal", 8: "octal" };
          input.placeholder = "Enter " + labels[currentBase] + "...";
          convert();
        };
      });

      input.oninput = convert;

      function convert() {
        var val = input.value.trim();
        var dec;
        try {
          if (currentBase === 2) dec = parseInt(val, 2);
          else if (currentBase === 10) dec = parseInt(val, 10);
          else if (currentBase === 16) dec = parseInt(val, 16);
          else if (currentBase === 8) dec = parseInt(val, 8);
        } catch (e) {
          dec = 0;
        }

        if (isNaN(dec)) dec = 0;

        var bin = dec.toString(2);
        var hex = dec.toString(16).toUpperCase();
        var oct = dec.toString(8);

        document.getElementById("bin").textContent = bin;
        document.getElementById("bin").dataset.val = bin;
        document.getElementById("dec").textContent = dec;
        document.getElementById("dec").dataset.val = dec;
        document.getElementById("hex").textContent = hex;
        document.getElementById("hex").dataset.val = hex;
        document.getElementById("oct").textContent = oct;
        document.getElementById("oct").dataset.val = oct;

        renderBits(bin);
      }

      function renderBits(binary) {
        var padded = binary.padStart(8, "0");
        var html = "";
        for (var i = 0; i < 8; i++) {
          var bit = padded[i];
          html += '<div class="bit bit-' + bit + '">' + bit + "</div>";
        }
        bits.innerHTML = html;
      }

      document.querySelectorAll(".result-value").forEach(function (el) {
        el.onclick = function () {
          navigator.clipboard.writeText(el.dataset.val);
          el.classList.add("copied");
          setTimeout(function () {
            el.classList.remove("copied");
          }, 500);
        };
      });

      convert();
    </script>
  </body>
</html>
