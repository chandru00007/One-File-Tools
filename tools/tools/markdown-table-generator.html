
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Markdown Table Generator - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #030712;
        --grid-line: #111827;
        --panel: rgba(17, 24, 39, 0.7);
        --panel-border: #1f2937;
        --accent: #2dd4bf;
        --accent-hover: #14b8a6;
        --accent-glow: rgba(45, 212, 191, 0.15);
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --text-dim: #4b5563;
        --radius-sm: 12px;
        --radius-md: 20px;
        --font-sans: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-display: "Space Grotesk", sans-serif;
        --color-weak: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg);
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 32px 32px;
        color: var(--text);
        padding: 48px 20px 80px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      .app {
        width: 100%;
        max-width: 820px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .wordmark {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: clamp(26px, 5vw, 38px);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 560px;
        margin: 0 auto;
      }

      .studio {
        background: var(--panel);
        backdrop-filter: blur(20px);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        margin-bottom: 24px;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: block;
        margin-bottom: 14px;
      }

      .dropzone {
        border: 2px dashed var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 32px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        background: rgba(3, 7, 18, 0.4);
      }

      .dropzone:hover,
      .dropzone.dragover {
        border-color: var(--accent);
        background: rgba(45, 212, 191, 0.05);
      }

      .dropzone:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .dropzone p {
        color: var(--text-muted);
        font-size: 14px;
      }

      .dropzone .hint {
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 6px;
      }

      .preview-wrap {
        margin-top: 16px;
        display: none;
        text-align: center;
      }

      .preview-wrap.visible {
        display: block;
      }

      .preview-wrap img {
        max-width: 100%;
        max-height: 300px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--panel-border);
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      .info-card {
        background: rgba(3, 7, 18, 0.5);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-sm);
        padding: 14px 16px;
      }

      .info-card .label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }

      .info-card .value {
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
        word-break: break-word;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .btn-ghost {
        background: rgba(31, 41, 55, 0.6);
        border: 1px solid var(--panel-border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 16px;
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-ghost:hover {
        background: rgba(55, 65, 81, 0.8);
      }

      .btn-ghost:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .empty-state {
        color: var(--text-dim);
        font-size: 14px;
        text-align: center;
        padding: 20px 0;
      }

      .footer-note {
        text-align: center;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
      }

      .footer-note a {
        color: var(--text-muted);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--text);
        color: var(--bg);
        padding: 12px 22px;
        border-radius: 99px;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .controls {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
        align-items: end;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .control-group label {
        font-size: 13px;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      .control-group select {
        background: rgba(3, 7, 18, 0.6);
        color: white;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
      }

      .templates {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      #tableContainer {
        overflow-x: auto;
      }

     #markdownOutput {
        width: 100%;
        min-height: 220px;
        margin-top: 16px;
        background: rgba(3, 7, 18, 0.6);
        color: white;
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 16px;
        font-family: var(--font-mono);
        resize: vertical;
     }
      @media (max-width: 640px) {
        .studio {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hero">
       <div class="eyebrow">Markdown Tools</div>
      <h1 class="wordmark">Markdown Table Generator</h1>
     <p class="tagline">
       Create Markdown tables visually with adjustable rows and columns,
       live Markdown preview, and one-click copy to clipboard.
     </p>
      </header>

     <main class="studio">
       <span class="section-label">Table Settings</span>

       <div class="controls">
          <div class="control-group">
             <label>Rows</label>
             <select id="rows">
                 <option>2</option>
                 <option selected>3</option>
                 <option>4</option>
                 <option>5</option>
                 <option>6</option>
                </select>
           </div>

          <div class="control-group">
              <label>Columns</label>
              <select id="cols">
                 <option>2</option>
                 <option>3</option>
                 <option selected>4</option>
                 <option>5</option>
                 <option>6</option>
                </select>
          </div>

          <button class="btn-ghost" id="generateBtn">
             Generate Table
           </button>
       </div>

       <div class="templates">
          <button class="btn-ghost">Simple</button>
          <button class="btn-ghost">README</button>
          <button class="btn-ghost">API</button>
       </div>
   </main>

     <main class="studio">

  <span class="section-label">
    Table
  </span>

  <div id="tableContainer"></div>

</main>

<main class="studio">

  <span class="section-label">
    Markdown Output
  </span>

  <textarea id="markdownOutput" readonly></textarea>

  <div class="actions">
    <button class="btn-ghost" id="copyBtn">
      Copy Markdown
    </button>
  </div>

</main>

      <p class="footer-note">Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a>. All processing happens in your browser.</p>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

   <script>
        const tableContainer = document.getElementById("tableContainer");
        const rowSelect = document.getElementById("rows");
        const colSelect = document.getElementById("cols");

        function generateTable() {

            const rows = Number(rowSelect.value);
            const cols = Number(colSelect.value);

            let table = document.createElement("table");

            for (let r = 0; r < rows; r++) {

                let tr = document.createElement("tr");

                for (let c = 0; c < cols; c++) {

                    let cell;

                    if (r === 0) {
                        cell = document.createElement("th");
                    } else {
                        cell = document.createElement("td");
                    }

                    let input = document.createElement("input");
                    
                    input.addEventListener("input", generateMarkdown);

                    input.type = "text";

                    input.className = "cell-input";

                    if (r === 0) {
                        input.value = "Column " + (c + 1);
                    }

                    cell.appendChild(input);

                    tr.appendChild(cell);
                }

                table.appendChild(tr);

            }

            tableContainer.innerHTML = "";

            tableContainer.appendChild(table);

            generateMarkdown();

        }
        function generateMarkdown() {

            const table = tableContainer.querySelector("table");

            if (!table) return;

            let markdown = "";

            const headers = [...table.rows[0].querySelectorAll("input")];

            markdown += "| ";
            markdown += headers.map(input => input.value || " ").join(" | ");
            markdown += " |\n";

            markdown += "| ";
            markdown += headers.map(() => "---").join(" | ");
            markdown += " |\n";

            for (let i = 1; i < table.rows.length; i++) {

                const inputs = [...table.rows[i].querySelectorAll("input")];

                markdown += "| ";
                markdown += inputs.map(input => input.value || " ").join(" | ");
                markdown += " |\n";

            }

            markdownOutput.value = markdown;

    }
        generateTable();

        const generateBtn = document.getElementById("generateBtn");

        generateBtn.addEventListener("click", generateTable);
        
        const copyBtn = document.getElementById("copyBtn");

        copyBtn.addEventListener("click", () => {

            navigator.clipboard.writeText(markdownOutput.value);

            copyBtn.textContent = "Copied!";

            setTimeout(() => {

                copyBtn.textContent = "Copy Markdown";

            }, 1500);

        });
  </script>

  </body>
</html>
