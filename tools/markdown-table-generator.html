<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Generate Markdown tables easily with this visual tool." />
    <title>Markdown Table Generator — One File Tools</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #fafafa;
        --surface: #f1f5f9;
        --text: #1a1a1a;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #2563eb;
        --radius: 8px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --surface: #1a1a1a;
          --text: #e5e5e5;
          --muted: #94a3b8;
          --border: #334155;
          --accent: #3b82f6;
        }
      }
      body {
        font-family: system-ui, sans-serif;
        line-height: 1.6;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem;
      }
      header {
        text-align: center;
        margin-bottom: 2rem;
      }
      header h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      header p {
        color: var(--muted);
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-header {
        font-weight: 600;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .controls {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .control-group label {
        font-size: 0.875rem;
      }
      input[type="number"] {
        width: 60px;
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        color: var(--text);
      }
      select {
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        color: var(--text);
      }
      textarea {
        width: 100%;
        min-height: 250px;
        padding: 1rem;
        font-family: monospace;
        font-size: 0.9rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg);
        color: var(--text);
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      .btn {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        font-size: 0.875rem;
      }
      .btn:hover {
        background: var(--border);
      }
      .btn-primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      th,
      td {
        padding: 0.75rem;
        text-align: left;
        border: 1px solid var(--border);
      }
      th {
        background: var(--bg);
        font-weight: 600;
      }
      th,
      td:first-child {
        font-weight: 600;
      }
      footer {
        text-align: center;
        padding: 2rem;
        color: var(--muted);
        font-size: 0.875rem;
      }
      footer a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📊 Markdown Table Generator</h1>
        <p>Create beautiful Markdown tables easily</p>
      </header>

      <div class="card">
        <div class="card-header">
          <span>Table Size</span>
        </div>
        <div class="controls">
          <div class="control-group">
            <label>Columns:</label>
            <input type="number" id="cols" value="3" min="2" max="10" />
          </div>
          <div class="control-group">
            <label>Rows:</label>
            <input type="number" id="rows" value="3" min="2" max="20" />
          </div>
          <button class="btn btn-primary" id="generateBtn">Generate</button>
        </div>
        <table id="preview">
          <thead>
            <tr>
              <th>Header 1</th>
              <th>Header 2</th>
              <th>Header 3</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Cell 1</td>
              <td>Cell 2</td>
              <td>Cell 3</td>
            </tr>
            <tr>
              <td>Cell 4</td>
              <td>Cell 5</td>
              <td>Cell 6</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-header">
          <span>Markdown Output</span>
          <button class="btn" id="copyBtn">Copy</button>
        </div>
        <textarea id="output" readonly></textarea>
      </div>

      <div class="card">
        <div class="card-header">Quick Templates</div>
        <div class="controls">
          <button class="btn" data-template="comparison">Comparison Table</button>
          <button class="btn" data-template="features">Features Table</button>
          <button class="btn" data-template="schedule">Schedule Table</button>
        </div>
      </div>
    </div>

    <footer>
      <p>Part of <a href="https://github.com/praveenscience/One-File-Tools">One File Tools</a></p>
    </footer>

    <script>
      var colsInput = document.getElementById("cols");
      var rowsInput = document.getElementById("rows");
      var table = document.getElementById("preview");
      var output = document.getElementById("output");
      var generateBtn = document.getElementById("generateBtn");
      var copyBtn = document.getElementById("copyBtn");

      var templates = {
        comparison: [
          ["Feature", "Option A", "Option B"],
          ["Price", "$10", "$20"],
          ["Support", "Email", "24/7"]
        ],
        features: [
          ["Feature", "Status", "Notes"],
          ["Dark Mode", "Done", "Works great"],
          ["Mobile", "In Progress", "Testing phase"]
        ],
        schedule: [
          ["Day", "Activity", "Time"],
          ["Monday", "Team Meeting", "9:00 AM"],
          ["Wednesday", "Workshop", "2:00 PM"]
        ]
      };

      function generate() {
        var cols = parseInt(colsInput.value);
        var rows = parseInt(rowsInput.value);

        var headers = [];
        for (var i = 1; i <= cols; i++) headers.push("Header " + i);
        var thead = "| " + headers.join(" | ") + " |";
        var sep =
          "| " +
          headers
            .map(function () {
              return "---";
            })
            .join(" | ") +
          " |";

        var tbody = "";
        for (var r = 0; r < rows; r++) {
          var cells = [];
          for (var c = 0; c < cols; c++) cells.push("Cell " + (r * cols + c + 1));
          tbody += "| " + cells.join(" | ") + " |\n";
        }

        output.value = thead + "\n" + sep + "\n" + tbody.replace(/\n$/, "");

        renderTable(cols, rows);
      }

      function renderTable(cols, rows) {
        var html = "<thead><tr>";
        for (var i = 1; i <= cols; i++) html += "<th>Header " + i + "</th>";
        html += "</tr></thead><tbody>";
        for (var r = 0; r < rows; r++) {
          html += "<tr>";
          for (var c = 0; c < cols; c++) html += "<td>Cell " + (r * cols + c + 1) + "</td>";
          html += "</tr>";
        }
        html += "</tbody>";
        table.innerHTML = html;
      }

      function applyTemplate(key) {
        var data = templates[key];
        if (!data) return;
        var cols = data[0].length;
        var rows = data.length - 1;
        colsInput.value = cols;
        rowsInput.value = rows;

        var thead = "|" + data[0].join("|") + "|";
        var sep =
          "|" +
          data[0]
            .map(function () {
              return "---";
            })
            .join("|");
        var tbody = data
          .slice(1)
          .map(function (row) {
            return "|" + row.join("|") + "|";
          })
          .join("\n");
        output.value = thead + "\n" + sep + "\n" + tbody;

        var html =
          "<thead><tr>" +
          data[0]
            .map(function (h) {
              return "<th>" + h + "</th>";
            })
            .join("") +
          "</tr></thead><tbody>";
        data.slice(1).forEach(function (row) {
          html +=
            "<tr>" +
            row
              .map(function (c) {
                return "<td>" + c + "</td>";
              })
              .join("") +
            "</tr>";
        });
        html += "</tbody>";
        table.innerHTML = html;
      }

      generateBtn.onclick = generate;

      copyBtn.onclick = function () {
        navigator.clipboard.writeText(output.value);
        copyBtn.textContent = "Copied!";
        setTimeout(function () {
          copyBtn.textContent = "Copy";
        }, 1000);
      };

      document.querySelectorAll("[data-template]").forEach(function (btn) {
        btn.onclick = function () {
          applyTemplate(btn.dataset.template);
        };
      });

      colsInput.onchange = generate;
      rowsInput.onchange = generate;

      generate();
    </script>
  </body>
</html>
